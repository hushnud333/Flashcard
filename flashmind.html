<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Generator</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; color: #333; }
        .card { border: 1px solid #ddd; border-radius: 5px; padding: 10px; margin: 10px; background-color: #fff; cursor: pointer; transition: background-color 0.3s; }
        .card:hover { background-color: #eaeaea; }
        .container { display: flex; flex-wrap: wrap; }
    </style>
</head>
<body>

<h1>Flashcard Generator</h1>
<div class="container" id="flashcardContainer"></div>

<script>
const subjects = ['Math', 'Science', 'History', 'Literature', 'Geography'];
const flashcardsPerSubject = 50;
const flashcardContainer = document.getElementById('flashcardContainer');

const generateFlashcards = () => {
    subjects.forEach(subject => {
        for (let i = 1; i <= flashcardsPerSubject; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<strong>${subject} Card ${i}:</strong> Sample Question?`;
            flashcardContainer.appendChild(card);
        }
    });
};

window.onload = () => {
    generateFlashcards();
};
</script>

</body>
</html>
