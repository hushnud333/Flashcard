<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlashMind - Study Better</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --indigo: #6366f1; --indigo-dark: #4f46e5; --purple: #8b5cf6;
  --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
  --slate-400: #94a3b8; --slate-500: #64748b; --slate-600: #475569;
  --slate-700: #334155; --slate-800: #1e293b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(135deg, #f0f4ff 0%, #f5f0ff 50%, #fdf4ff 100%);
  min-height: 100vh; color: var(--slate-800);
}

nav {
  background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--slate-200); position: sticky; top: 0; z-index: 100; padding: 12px 20px;
}
.nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--indigo), var(--purple));
  display: flex; align-items: center; justify-content: center; color: white; font-weight: 900;
}
.nav-btn {
  padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
  border: none; cursor: pointer; transition: all .2s; background: transparent; color: var(--slate-600);
}
.nav-btn.active { background: #eef2ff; color: var(--indigo); }

.container { max-width: 1100px; margin: 0 auto; padding: 32px 20px; display: flex; gap: 28px; }
@media(max-width:768px) { .container { flex-direction: column; } }

.sidebar { width: 220px; flex-shrink: 0; }
.sidebar-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid var(--slate-100); box-shadow: 0 2px 12px rgba(0,0,0,.05); }
.sidebar-title { font-size: 11px; font-weight: 800; color: var(--slate-400); text-transform: uppercase; margin-bottom: 14px; }
.subj-btn {
  display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border-radius: 12px;
  border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--slate-600); margin-bottom: 4px;
}
.subj-btn.active { background: linear-gradient(135deg, var(--indigo), var(--purple)); color: white; }

main { flex: 1; min-width: 0; }
.hero {
  background: linear-gradient(135deg, #4f46e5, #7c3aed, #9333ea);
  border-radius: 28px; padding: 36px; color: white; margin-bottom: 24px;
}
.hero-title { font-weight: 900; font-size: 32px; margin-bottom: 6px; }

.gen-section {
  background: white; border-radius: 20px; padding: 24px; margin-bottom: 20px;
  border: 1px solid var(--slate-100); box-shadow: 0 2px 12px rgba(0,0,0,.05);
}
.gen-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.gen-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: var(--indigo); color: white; }
.gen-row { display: flex; gap: 10px; flex-direction: column; }
.gen-input {
  padding: 12px 16px; border-radius: 12px; border: 1.5px solid var(--slate-200); outline: none; background: var(--slate-50);
}
.gen-btn {
  padding: 12px; border-radius: 12px; background: linear-gradient(135deg, var(--indigo), var(--purple));
  color: white; border: none; font-weight: 700; cursor: pointer;
}

.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-top: 20px; }
.card-wrap { perspective: 1000px; height: 180px; cursor: pointer; }
.card-inner {
  position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s;
}
.card-wrap.flipped .card-inner { transform: rotateY(180deg); }
.card-face {
  position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
  border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center;
}
.card-front { background: white; border: 1px solid var(--slate-200); }
.card-back { background: var(--indigo); color: white; transform: rotateY(180deg); }
.empty { text-align: center; padding: 40px; color: var(--slate-400); }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="logo"><div class="logo-icon">F</div><span class="logo-text" style="font-weight:900">FlashMind</span></div>
    <div class="nav-right">
      <button class="nav-btn active">Asosiy</button>
    </div>
  </div>
</nav>

<div class="container">
  <aside class="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-title">Yo'nalishlar</div>
      <button class="subj-btn active" onclick="switchSubject('english')">📖 Ingliz tili</button>
      <button class="subj-btn" onclick="switchSubject('math')">📐 Matematika</button>
      <button class="subj-btn" onclick="switchSubject('science')">🔬 Fan</button>
      <button class="subj-btn" onclick="switchSubject('custom')">✨ Mening kartalarim</button>
    </div>
  </aside>

  <main>
    <div class="hero">
      <div class="hero-title" id="currentTitle">Ingliz tili</div>
      <p style="opacity:0.8">Yangi narsalarni o'rganish va yodda saqlash vaqti!</p>
    </div>

    <div class="gen-section">
      <div class="gen-header">
        <div class="gen-icon">➕</div>
        <div>
          <div style="font-weight:700">Yangi Flashcard Qo'shish</div>
          <div style="font-size:12px; color:var(--slate-500)">Ushbu yo'nalishga o'z ma'lumotingizni kiriting</div>
        </div>
      </div>
      <div class="gen-row">
        <input class="gen-input" id="termInput" placeholder="Savol yoki Atama..."/>
        <input class="gen-input" id="defInput" placeholder="Javob yoki Ma'nosi..."/>
        <button class="gen-btn" onclick="addManualCard()">Kartani Saqlash</button>
      </div>
    </div>

    <div id="cardsSection">
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
    <div id="emptyState" class="empty" style="display:none">Hali kartalar yo'q. Birinchi kartangizni qo'shing!</div>
  </main>
</div>

<script>
// Ma'lumotlar bazasi (LocalStorage bilan)
let currentSubject = 'english';
let decks = JSON.parse(localStorage.getItem('flashmind_decks')) || {
  english: [
    {term: "Ephemeral", definition: "Juda qisqa vaqt davom etadigan"},
    {term: "Eloquent", definition: "Chiroyli va ta'sirli gapiradigan"}
  ],
  math: [
    {term: "Hypotenuse", definition: "To'g'ri burchakli uchburchakning eng uzun tomoni"}
  ],
  science: [],
  custom: []
};

function saveToLocal() {
    localStorage.setItem('flashmind_decks', JSON.stringify(decks));
}

function switchSubject(subj) {
    currentSubject = subj;
    
    // Tugmalarni yangilash
    document.querySelectorAll('.subj-btn').forEach(btn => {
        btn.classList.remove('active');
        if(btn.innerText.toLowerCase().includes(subj.toLowerCase()) || (subj==='custom' && btn.innerText.includes('Mening'))) {
            btn.classList.add('active');
        }
    });

    // Sarlavhani yangilash
    const titles = {english:'Ingliz tili', math:'Matematika', science:'Fan', custom:'Mening kartalarim'};
    document.getElementById('currentTitle').innerText = titles[subj];

    renderCards();
}

function addManualCard() {
    const term = document.getElementById('termInput').value;
    const def = document.getElementById('defInput').value;

    if(!term || !def) {
        alert("Iltimos, ikkala maydonni ham to'ldiring!");
        return;
    }

    decks[currentSubject].push({term, definition: def});
    saveToLocal();
    
    document.getElementById('termInput').value = '';
    document.getElementById('defInput').value = '';
    
    renderCards();
}

function renderCards() {
    const grid = document.getElementById('cardsGrid');
    const empty = document.getElementById('emptyState');
    const currentCards = decks[currentSubject];

    grid.innerHTML = '';
    
    if(currentCards.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
    } else {
        grid.style.display = 'grid';
        empty.style.display = 'none';
        
        currentCards.forEach((card, index) => {
            grid.innerHTML += `
                <div class="card-wrap" onclick="this.classList.toggle('flipped')">
                    <div class="card-inner">
                        <div class="card-face card-front">
                            <div style="font-size:10px; color:var(--slate-400); margin-bottom:8px">SAVOL</div>
                            <div style="font-weight:800; font-size:18px">${card.term}</div>
                        </div>
                        <div class="card-face card-back">
                            <div style="font-size:10px; opacity:0.7; margin-bottom:8px">JAVOB</div>
                            <div style="font-weight:500; font-size:15px">${card.definition}</div>
                            <button onclick="deleteCard(${index}, event)" style="margin-top:15px; background:rgba(255,255,255,0.2); border:none; color:white; padding:4px 8px; border-radius:5px; font-size:10px; cursor:pointer">O'chirish</button>
                        </div>
                    </div>
                </div>
            `;
        });
    }
}

function deleteCard(index, event) {
    event.stopPropagation(); // Kartani ag'darilib ketishini to'xtatadi
    if(confirm("Ushbu kartani o'chirib tashlamoqchimisiz?")) {
        decks[currentSubject].splice(index, 1);
        saveToLocal();
        renderCards();
    }
}

// Birinchi marta yuklanganda
renderCards();
</script>

</body>
</html>
